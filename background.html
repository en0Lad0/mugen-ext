<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        const TARGET_MARK_ID = "en0lad0.mugen/target-mark";
        const ICON_URL = "https://en0lad0.github.io/mugen-ext/icon.svg";

        OBR.onReady(() => {
            OBR.contextMenu.create({
                id: "en0lad0.mugen/set-caster",
                icons: [{ icon: ICON_URL, label: "1. Set / Remove Caster", filter: { every: [{ key: "type", value: "IMAGE" }] } }],
                onClick: async (context) => {
                    const clickedId = context.items[0].id;
                    const metadata = await OBR.room.getMetadata();
                    if (metadata["en0lad0.mugen/caster"] === clickedId) {
                        OBR.room.setMetadata({ "en0lad0.mugen/caster": undefined });
                        OBR.notification.show("ยกเลิกผู้ร่ายแล้ว", "INFO");
                    } else {
                        OBR.room.setMetadata({ "en0lad0.mugen/caster": clickedId });
                        OBR.notification.show("ล็อกคนร่ายมุเก็นเรียบร้อย!", "SUCCESS");
                    }
                }
            });

            OBR.contextMenu.create({
                id: "en0lad0.mugen/lock-target",
                icons: [{ icon: ICON_URL, label: "2. Lock / Unlock Target", filter: { every: [{ key: "type", value: "IMAGE" }] } }],
                onClick: async (context) => {
                    const clickedId = context.items[0].id;
                    const metadata = await OBR.room.getMetadata();
                    if (metadata["en0lad0.mugen/target"] === clickedId) {
                        OBR.room.setMetadata({ "en0lad0.mugen/target": undefined });
                        OBR.notification.show("ปลดล็อกเป้าหมายแล้ว", "INFO");
                        return;
                    }
                    if (metadata["en0lad0.mugen/caster"] === clickedId) {
                        OBR.notification.show("ล็อกเป้าใส่ตัวเองไม่ได้นะ!", "ERROR");
                        return;
                    }
                    OBR.room.setMetadata({ "en0lad0.mugen/target": clickedId });
                    await drawTargetMark(clickedId);
                }
            });

            OBR.room.onMetadataChange((metadata) => {
                if (!metadata["en0lad0.mugen/target"]) {
                    OBR.scene.items.deleteItems([TARGET_MARK_ID]);
                }
            });

            // รอรับคำสั่งจากปุ่มกด
            OBR.broadcast.onMessage("en0lad0.mugen/anim", async (event) => {
                const data = event.data;
                await playLocalAnimation(data.casterId, data.targetId, data.gifFileName);
            });
        });

        async function drawTargetMark(tId) {
            await OBR.scene.items.deleteItems([TARGET_MARK_ID]); 
            const items = await OBR.scene.items.getItems([tId]);
            if (items.length === 0) return;
            const target = items[0];
            const markSize = target.image ? Math.max(target.image.width, target.image.height) * 1.5 : 300;

            const mark = {
                id: TARGET_MARK_ID,
                type: "SHAPE",
                shapeType: "CIRCLE",
                width: markSize, height: markSize,
                strokeColor: "#ff0000", strokeWidth: 15, fillOpacity: 0,
                position: target.position,
                attachedTo: tId, 
                layer: "ATTACHMENT",
                disableHit: true, locked: true, visible: true
            };
            await OBR.scene.items.addItems([mark]);
        }

        // ฟังก์ชันช่วยก๊อปปี้ Token เลี่ยงบั๊กเซิร์ฟเวอร์
        function createOrb(baseToken, id, url, x, y, scaleVal) {
            const orb = JSON.parse(JSON.stringify(baseToken)); 
            orb.id = id;
            orb.name = "Mugen Skill";
            orb.image = { url: url, width: 250, height: 250, mime: "image/gif" };
            orb.grid = { dpi: 300, offset: { x: 125, y: 125 } };
            orb.position = { x: x, y: y };
            orb.scale = { x: scaleVal, y: scaleVal };
            orb.rotation = 0;
            orb.layer = "NOTE"; 
            orb.disableHit = true; 
            orb.locked = true; 
            orb.visible = true;
            orb.zIndex = 9999;
            orb.attachedTo = undefined; 
            return orb;
        }

        // สร้างภาพลวงตา Local เฉพาะบนหน้าจอ (ทำงานไหลลื่น ไม่แคร์ Server)
        async function playLocalAnimation(sourceId, targetId, gifFileName) {
            const items = await OBR.scene.items.getItems([sourceId, targetId]);
            const source = items.find(i => i.id === sourceId);
            const target = items.find(i => i.id === targetId);

            if(!source || !target) return;

            const spawnX = source.position.x;
            const spawnY = source.position.y;

            const runInterval = (duration, onUpdate) => {
                return new Promise(res => {
                    const steps = Math.floor(duration / 40); 
                    let current = 0;
                    const interval = setInterval(async () => {
                        current++;
                        const progress = Math.min(current / steps, 1);
                        await onUpdate(progress);
                        if (current >= steps) {
                            clearInterval(interval);
                            res();
                        }
                    }, 40);
                });
            };

            const isMurazaki = gifFileName.includes("Murazaki");

            if (isMurazaki) {
                // ==========================================
                // โหมดมุราซากิ (9 วินาที อลังการงานสร้าง)
                // ==========================================
                const akaUrl = "https://en0lad0.github.io/mugen-ext/Aka.gif";
                const aoUrl = "https://en0lad0.github.io/mugen-ext/Ao.gif";
                const muraUrl = "https://en0lad0.github.io/mugen-ext/Murazaki.gif";

                const akaX = spawnX + 150; 
                const akaY = spawnY;
                const aoX = spawnX - 150;  
                const aoY = spawnY;

                const akaId = "anim-aka-" + Math.random().toString(36).substr(2, 9);
                const aoId = "anim-ao-" + Math.random().toString(36).substr(2, 9);
                const muraId = "anim-mura-" + Math.random().toString(36).substr(2, 9);

                try {
                    // ใช้ local.addItems สร้างภาพลวงตาแบบ Embers
                    await OBR.scene.local.addItems([
                        createOrb(source, akaId, akaUrl, akaX, akaY, 0.1),
                        createOrb(source, aoId, aoUrl, aoX, aoY, 0.1)
                    ]);

                    await runInterval(2500, async (p) => {
                        const scale = 0.1 + (0.9 * p);
                        try {
                            await OBR.scene.local.updateItems([akaId, aoId], items => {
                                items.forEach(i => i.scale = {x: scale, y: scale});
                            });
                        } catch(e) {}
                    });

                    await runInterval(2000, async (p) => {
                        const curAkaX = akaX + (spawnX - akaX) * p;
                        const curAoX = aoX + (spawnX - aoX) * p;
                        try {
                            await OBR.scene.local.updateItems([akaId, aoId], items => {
                                let aka = items.find(i => i.id === akaId);
                                let ao = items.find(i => i.id === aoId);
                                if(aka) aka.position.x = curAkaX;
                                if(ao) ao.position.x = curAoX;
                            });
                        } catch(e) {}
                    });

                    await OBR.scene.local.deleteItems([akaId, aoId]);
                    await OBR.scene.local.addItems([createOrb(source, muraId, muraUrl, spawnX, spawnY, 0.5)]);

                    await runInterval(2500, async (p) => {
                        const scale = 0.5 + (2.0 * p); 
                        try {
                            await OBR.scene.local.updateItems([muraId], items => {
                                if(items[0]) items[0].scale = {x: scale, y: scale};
                            });
                        } catch(e) {}
                    });

                    await runInterval(2000, async (p) => {
                        const curX = spawnX + (target.position.x - spawnX) * p;
                        const curY = spawnY + (target.position.y - spawnY) * p;
                        try {
                            await OBR.scene.local.updateItems([muraId], items => {
                                if(items[0]) items[0].position = {x: curX, y: curY};
                            });
                        } catch(e) {}
                    });

                    setTimeout(async () => { await OBR.scene.local.deleteItems([muraId]); }, 300);

                } catch (e) {}

            } else {
                // ==========================================
                // โหมดปกติ (Aka / Ao) ชาร์จ 2.5 วิ ยิง 2 วิ
                // ==========================================
                const projectileId = "anim-" + Math.random().toString(36).substr(2, 9);
                const fullImageUrl = "https://en0lad0.github.io/mugen-ext/" + gifFileName;
                
                try {
                    await OBR.scene.local.addItems([createOrb(source, projectileId, fullImageUrl, spawnX, spawnY, 0.1)]);
                    
                    await runInterval(2500, async (p) => {
                        const scale = 0.1 + (0.9 * p);
                        try {
                            await OBR.scene.local.updateItems([projectileId], items => {
                                if(items[0]) items[0].scale = {x: scale, y: scale};
                            });
                        } catch(e) {}
                    });

                    await runInterval(2000, async (p) => {
                        const curX = spawnX + (target.position.x - spawnX) * p;
                        const curY = spawnY + (target.position.y - spawnY) * p;
                        try {
                            await OBR.scene.local.updateItems([projectileId], items => {
                                if(items[0]) items[0].position = {x: curX, y: curY};
                            });
                        } catch(e) {}
                    });

                    setTimeout(async () => { await OBR.scene.local.deleteItems([projectileId]); }, 300);

                } catch (e) {}
            }
        }
    </script>
</body>
</html>
