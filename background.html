<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        const TOOL_ID = "en0lad0.mugen/tool";
        const MODE_TARGET = "en0lad0.mugen/mode-target";
        const TARGET_MARK_ID = "en0lad0.mugen/target-mark";
        const ICON_URL = "https://en0lad0.github.io/mugen-ext/icon.svg";
        
        let targetTokenId = null;

        OBR.onReady(() => {
            // 1. ระบบ Set Caster (คลิกขวา)
            OBR.contextMenu.create({
                id: "mugen-set-caster",
                icons: [{ icon: ICON_URL, label: "Set as Mugen Caster", filter: { every: [{ key: "layer", value: "CHARACTER" }] } }],
                onClick: (context) => {
                    const casterId = context.items[0].id;
                    OBR.room.setMetadata({ "en0lad0.mugen/caster": casterId });
                    OBR.notification.show("ล็อกคนร่ายมุเก็นเรียบร้อย!", "SUCCESS");
                }
            });

            // 2. สร้าง Tool หลักฝังเข้า Owlbear (เหมือน Embers)
            OBR.tool.create({
                id: TOOL_ID,
                icons: [{ icon: ICON_URL, label: "Mugen Toolkit" }],
                defaultMode: MODE_TARGET,
                defaultMetadata: {}
            });

            // 3. สร้างโหมดเล็งเป้า (เมาส์ปากกา)
            OBR.tool.createMode({
                id: MODE_TARGET,
                icons: [{ icon: ICON_URL, label: "🎯 เล็งศัตรู (คลิกที่บอร์ด)", filter: { activeTools: [TOOL_ID] } }],
                onToolClick: async (context, event) => {
                    const clickedId = event.target;
                    if (!clickedId) return;

                    const items = await OBR.scene.items.getItems([clickedId]);
                    if (items.length > 0 && items[0].layer === "CHARACTER") {
                        targetTokenId = clickedId;
                        await drawTargetMark(targetTokenId);
                        OBR.notification.show("ล็อกเป้าแล้ว! กดสกิลที่แถบด้านบนได้เลย", "INFO");
                    }
                }
            });

            // 4. ปุ่ม Action สกิลบน Toolbar แถบบนสุด
            OBR.tool.createAction({
                id: "mugen-action-aka",
                icons: [{ icon: ICON_URL, label: "🔴 ยิง Aka (Red)", filter: { activeTools: [TOOL_ID] } }],
                onClick: () => fireSkill("Aka.gif")
            });

            OBR.tool.createAction({
                id: "mugen-action-ao",
                icons: [{ icon: ICON_URL, label: "🔵 ยิง Ao (Blue)", filter: { activeTools: [TOOL_ID] } }],
                onClick: () => fireSkill("Ao.gif")
            });

            OBR.tool.createAction({
                id: "mugen-action-murasaki",
                icons: [{ icon: ICON_URL, label: "🟣 ยิง Murasaki (Purple)", filter: { activeTools: [TOOL_ID] } }],
                onClick: () => fireSkill("Murazaki.gif")
            });

            OBR.tool.createAction({
                id: "mugen-action-cancel",
                icons: [{ icon: ICON_URL, label: "❌ ยกเลิก / ปิด", filter: { activeTools: [TOOL_ID] } }],
                onClick: async () => {
                    await cleanupTarget();
                    OBR.tool.activateTool("owlbear.rodeo/core/default");
                }
            });

            // ลบเป้าถ้าผู้เล่นเปลี่ยนไปใช้เมาส์อื่น (เช่นเปลี่ยนไปใช้ไม้บรรทัดวัดระยะ)
            OBR.tool.onToolChange(async (activeToolId) => {
                if (activeToolId !== TOOL_ID) {
                    await cleanupTarget();
                }
            });
        });

        async function drawTargetMark(tId) {
            await cleanupTarget(); 
            const items = await OBR.scene.items.getItems([tId]);
            if (items.length === 0) return;
            const target = items[0];
            const markSize = target.image ? Math.max(target.image.width, target.image.height) * 1.5 : 300;

            const mark = {
                id: TARGET_MARK_ID,
                type: "SHAPE",
                shapeType: "CIRCLE",
                width: markSize, height: markSize,
                strokeColor: "#ff0000", strokeWidth: 15, fillOpacity: 0,
                position: target.position,
                attachedTo: tId, 
                layer: "ATTACHMENT",
                disableHit: true, locked: true, visible: true
            };
            await OBR.scene.items.addItems([mark]);
        }

        async function cleanupTarget() {
            targetTokenId = null;
            await OBR.scene.items.deleteItems([TARGET_MARK_ID]);
        }

        async function fireSkill(gifFileName) {
            const metadata = await OBR.room.getMetadata();
            const casterId = metadata["en0lad0.mugen/caster"];

            if (!casterId) {
                OBR.notification.show("ต้องคลิกขวาที่ตัวเองเพื่อ Set Caster ก่อนยิง!", "ERROR");
                return;
            }
            if (!targetTokenId) {
                OBR.notification.show("ต้องคลิกที่ศัตรูเพื่อเล็งเป้าก่อนยิง!", "WARNING");
                return;
            }
            if (casterId === targetTokenId) {
                OBR.notification.show("ยิงใส่ตัวเองไม่ได้นะ!", "ERROR");
                return;
            }

            await playAnimation(casterId, targetTokenId, gifFileName);
            
            setTimeout(async () => {
                await cleanupTarget();
                OBR.tool.activateTool("owlbear.rodeo/core/default"); // ยิงเสร็จสลับเมาส์กลับให้
            }, 800);
        }

        async function playAnimation(sourceId, targetId, gifFileName) {
            const items = await OBR.scene.items.getItems([sourceId, targetId]);
            const source = items.find(i => i.id === sourceId);
            const target = items.find(i => i.id === targetId);

            if(!source || !target) return;

            const projectileId = "anim-" + Math.random().toString(36).substr(2, 9);
            const fullImageUrl = new URL(gifFileName, "https://en0lad0.github.io/mugen-ext/").href;
            
            const projectile = {
                id: projectileId,
                type: "IMAGE",
                image: { url: fullImageUrl, width: 150, height: 150, mime: "image/gif" },
                position: source.position,
                layer: "NOTE", 
                disableHit: true, locked: true, visible: true
            };

            await OBR.scene.items.addItems([projectile]);

            const frames = 20; 
            let currentFrame = 0;
            const dx = (target.position.x - source.position.x) / frames;
            const dy = (target.position.y - source.position.y) / frames;

            const animInterval = setInterval(async () => {
                currentFrame++;
                await OBR.scene.items.updateItems([projectileId], (itemsToUpdate) => {
                    itemsToUpdate[0].position.x = source.position.x + (dx * currentFrame);
                    itemsToUpdate[0].position.y = source.position.y + (dy * currentFrame);
                });

                if (currentFrame >= frames) {
                    clearInterval(animInterval);
                    setTimeout(() => { OBR.scene.items.deleteItems([projectileId]); }, 100);
                }
            }, 1000 / 30); 
        }
    </script>
</body>
</html>
