<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        const TARGET_MARK_ID = "en0lad0.mugen/target-mark";
        const ICON_URL = "https://en0lad0.github.io/mugen-ext/icon.svg";

        OBR.onReady(() => {
            // ระบบคลิกขวา Set Caster
            OBR.contextMenu.create({
                id: "en0lad0.mugen/set-caster",
                icons: [{ icon: ICON_URL, label: "1. Set / Remove Caster", filter: { every: [{ key: "type", value: "IMAGE" }] } }],
                onClick: async (context) => {
                    const clickedId = context.items[0].id;
                    const metadata = await OBR.room.getMetadata();
                    if (metadata["en0lad0.mugen/caster"] === clickedId) {
                        OBR.room.setMetadata({ "en0lad0.mugen/caster": undefined });
                        OBR.notification.show("ยกเลิกผู้ร่ายแล้ว", "INFO");
                    } else {
                        OBR.room.setMetadata({ "en0lad0.mugen/caster": clickedId });
                        OBR.notification.show("ล็อกคนร่ายมุเก็นเรียบร้อย!", "SUCCESS");
                    }
                }
            });

            // ระบบคลิกขวา Lock Target
            OBR.contextMenu.create({
                id: "en0lad0.mugen/lock-target",
                icons: [{ icon: ICON_URL, label: "2. Lock / Unlock Target", filter: { every: [{ key: "type", value: "IMAGE" }] } }],
                onClick: async (context) => {
                    const clickedId = context.items[0].id;
                    const metadata = await OBR.room.getMetadata();
                    if (metadata["en0lad0.mugen/target"] === clickedId) {
                        OBR.room.setMetadata({ "en0lad0.mugen/target": undefined });
                        OBR.notification.show("ปลดล็อกเป้าหมายแล้ว", "INFO");
                        return;
                    }
                    if (metadata["en0lad0.mugen/caster"] === clickedId) {
                        OBR.notification.show("ล็อกเป้าใส่ตัวเองไม่ได้นะ!", "ERROR");
                        return;
                    }
                    OBR.room.setMetadata({ "en0lad0.mugen/target": clickedId });
                    await drawTargetMark(clickedId);
                }
            });

            // ระบบลบวงแหวนอัตโนมัติ
            OBR.room.onMetadataChange((metadata) => {
                if (!metadata["en0lad0.mugen/target"]) {
                    OBR.scene.items.deleteItems([TARGET_MARK_ID]);
                }
            });

            // ⭐ ไฮไลต์เด็ดแบบ Embers: รอรับคำสั่งยิงจาก Broadcast
            OBR.broadcast.onMessage("en0lad0.mugen/anim", async (event) => {
                const data = event.data;
                await playLocalAnimation(data.casterId, data.targetId, data.gifFileName);
            });
        });

        async function drawTargetMark(tId) {
            await OBR.scene.items.deleteItems([TARGET_MARK_ID]); 
            const items = await OBR.scene.items.getItems([tId]);
            if (items.length === 0) return;
            const target = items[0];
            const markSize = target.image ? Math.max(target.image.width, target.image.height) * 1.5 : 300;

            const mark = {
                id: TARGET_MARK_ID,
                type: "SHAPE",
                shapeType: "CIRCLE",
                width: markSize, height: markSize,
                strokeColor: "#ff0000", strokeWidth: 15, fillOpacity: 0,
                position: target.position,
                attachedTo: tId, 
                layer: "ATTACHMENT",
                disableHit: true, locked: true, visible: true
            };
            await OBR.scene.items.addItems([mark]);
        }

        // ⭐ ฟังก์ชันสร้างภาพลวงตา ไม่ส่งผลกระทบต่อ Server แน่นอน 100%
        async function playLocalAnimation(sourceId, targetId, gifFileName) {
            const items = await OBR.scene.items.getItems([sourceId, targetId]);
            const source = items.find(i => i.id === sourceId);
            const target = items.find(i => i.id === targetId);

            if(!source || !target) return;

            const projectileId = "anim-" + Math.random().toString(36).substr(2, 9);
            const fullImageUrl = "https://en0lad0.github.io/mugen-ext/" + gifFileName;
            
            const projectile = {
                id: projectileId,
                type: "IMAGE",
                name: "Mugen Skill",
                image: { url: fullImageUrl, width: 250, height: 250, mime: "image/gif" },
                grid: { dpi: 300, offset: { x: 125, y: 125 } },
                position: { x: source.position.x, y: source.position.y },
                scale: { x: 1, y: 1 },
                rotation: 0,
                layer: "NOTE", 
                disableHit: true, 
                locked: true, 
                visible: true,
                zIndex: 9999,
                metadata: {}
            };

            // ใช้ .local.addItems แทน .items.addItems (หลอกตาระบบ)
            await OBR.scene.local.addItems([projectile]);

            const frames = 20; 
            let currentFrame = 0;
            const dx = (target.position.x - source.position.x) / frames;
            const dy = (target.position.y - source.position.y) / frames;

            const animInterval = setInterval(async () => {
                currentFrame++;
                try {
                    // ใช้ .local.updateItems วิ่งเนียนๆ ในจอคอมเราเอง
                    await OBR.scene.local.updateItems([projectileId], (itemsToUpdate) => {
                        if (itemsToUpdate && itemsToUpdate.length > 0) {
                            itemsToUpdate[0].position.x = source.position.x + (dx * currentFrame);
                            itemsToUpdate[0].position.y = source.position.y + (dy * currentFrame);
                        }
                    });
                } catch(e) {}

                if (currentFrame >= frames) {
                    clearInterval(animInterval);
                    setTimeout(async () => { 
                        // ยิงเสร็จก็ลบของปลอมทิ้ง
                        await OBR.scene.local.deleteItems([projectileId]); 
                    }, 200);
                }
            }, 30); // วิ่งไวขึ้น เนียนตาขึ้น
        }
    </script>
</body>
</html>
