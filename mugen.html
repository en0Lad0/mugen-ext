<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugen Skills</title>
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: #222; margin: 0; padding: 10px; }
        .btn { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; color: white; border: none; font-weight: bold; border-radius: 5px;}
        .aka { background: #d32f2f; }
        .ao { background: #1976d2; }
        .murasaki { background: #7b1fa2; }
    </style>
</head>
<body>
    <h4 id="status">กำลังโหลด...</h4>
    <!-- สังเกตว่าเอา / หน้าชื่อไฟล์ออกแล้ว -->
    <button class="btn aka" onclick="selectSkill('Aka', 'Aka.gif')">Aka (Red)</button>
    <button class="btn ao" onclick="selectSkill('Ao', 'Ao.gif')">Ao (Blue)</button>
    <button class="btn murasaki" onclick="selectSkill('Murasaki', 'Murazaki.gif')">Murasaki (Purple)</button>

    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        let sourceId = null;

        OBR.onReady(async () => {
            const selection = await OBR.player.getSelection();
            if (selection && selection.length === 1) {
                sourceId = selection[0];
                document.getElementById('status').innerText = "เลือก Skill ที่ต้องการร่าย";
            } else {
                document.getElementById('status').innerText = "กรุณาคลิกเลือก Token ตัวเองก่อนเปิดเมนู";
            }
        });

        window.selectSkill = async (skillName, gifPath) => {
            if (!sourceId) {
                document.getElementById('status').innerText = "ต้องเลือก Token ของตัวเองก่อน!";
                return;
            }
            
            document.getElementById('status').innerText = `กำลังร่าย ${skillName}... (คลิกที่เป้าหมาย)`;

            const unsubscribe = OBR.selectedItems.onChange(async (items) => {
                const targetId = items[0];
                if (targetId && targetId !== sourceId) {
                    unsubscribe(); 
                    document.getElementById('status').innerText = `โจมตี!`;
                    await playAnimation(sourceId, targetId, gifPath);
                }
            });
        };

        async function playAnimation(sourceId, targetId, gifPath) {
            const items = await OBR.scene.items.getItems([sourceId, targetId]);
            const source = items.find(i => i.id === sourceId);
            const target = items.find(i => i.id === targetId);

            if(!source || !target) return;

            const projectileId = "anim-" + Math.random().toString(36).substr(2, 9);
            // บรรทัดนี้จะสร้างลิงก์รูปภาพให้ถูกต้องตามโฟลเดอร์บน GitHub อัตโนมัติ
            const fullImageUrl = new URL(gifPath, window.location.href).href;
            
            const projectile = {
                id: projectileId,
                type: "IMAGE",
                image: {
                    url: fullImageUrl,
                    width: 150, 
                    height: 150, 
                    mime: "image/gif"
                },
                position: source.position,
                layer: "ATTACHMENT",
                disableHit: true, 
                locked: true,
                visible: true
            };

            await OBR.scene.items.addItems([projectile]);

            const frames = 15; 
            let currentFrame = 0;
            const dx = (target.position.x - source.position.x) / frames;
            const dy = (target.position.y - source.position.y) / frames;

            const animInterval = setInterval(async () => {
                currentFrame++;
                await OBR.scene.items.updateItems([projectileId], (itemsToUpdate) => {
                    itemsToUpdate[0].position.x = source.position.x + (dx * currentFrame);
                    itemsToUpdate[0].position.y = source.position.y + (dy * currentFrame);
                });

                if (currentFrame >= frames) {
                    clearInterval(animInterval);
                    setTimeout(() => {
                        OBR.scene.items.deleteItems([projectileId]);
                    }, 100);
                }
            }, 1000 / 30); 
        }
    </script>
</body>
</html>
