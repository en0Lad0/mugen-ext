<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugen Skills</title>
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: #222; margin: 0; padding: 10px; }
        .btn { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; color: white; border: none; font-weight: bold; border-radius: 5px; transition: 0.3s;}
        .btn:disabled { opacity: 0.3; cursor: not-allowed; } /* สีเทาตอนปุ่มโดนล็อก */
        .aka { background: #d32f2f; }
        .ao { background: #1976d2; }
        .murasaki { background: #7b1fa2; }
        #status { font-size: 14px; margin-bottom: 15px; color: #ffeb3b; }
    </style>
</head>
<body>
    <div id="status">กำลังตรวจสอบ...</div>
    <button id="btn-aka" class="btn aka" onclick="selectSkill('Aka', 'Aka.gif')" disabled>Aka (Red)</button>
    <button id="btn-ao" class="btn ao" onclick="selectSkill('Ao', 'Ao.gif')" disabled>Ao (Blue)</button>
    <button id="btn-murasaki" class="btn murasaki" onclick="selectSkill('Murasaki', 'Murazaki.gif')" disabled>Murasaki (Purple)</button>

    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        let casterId = null;
        let targetId = null;

        // ฟังก์ชันคอยเช็คว่าพร้อมยิงหรือยัง
        async function checkState() {
            const metadata = await OBR.room.getMetadata();
            casterId = metadata["mugen-ext/casterId"]; // ดึงข้อมูลคนร่ายที่เซ็ตไว้จากการคลิกขวา

            const selection = await OBR.player.getSelection();
            targetId = selection.length === 1 ? selection[0] : null; // ดูว่ากดคลิกศัตรูบนกระดานหรือยัง

            const statusEl = document.getElementById('status');
            const btns = document.querySelectorAll('.btn');

            if (!casterId) {
                statusEl.innerText = "1. ต้องไปคลิกขวาที่ Token ตัวเองแล้วเลือก 'Set as Mugen Caster' ก่อน";
                btns.forEach(btn => btn.disabled = true);
            } else if (!targetId || targetId === casterId) {
                statusEl.innerText = "2. คลิกเลือก Token ศัตรูบนกระดานเพื่อเล็งเป้าหมาย";
                btns.forEach(btn => btn.disabled = true);
            } else {
                statusEl.innerText = "🎯 ล็อกเป้าหมายพร้อมยิง! เลือกสกิลเลย";
                btns.forEach(btn => btn.disabled = false);
            }
        }

        OBR.onReady(async () => {
            await checkState();

            // ถ้ามีการเปลี่ยนการคลิกเป้าหมายบนกระดาน ให้เช็คสถานะใหม่ทันที
            OBR.player.onChange(async () => {
                await checkState();
            });

            // ถ้ามีการคลิกขวาเปลี่ยนคนร่าย ให้เช็คสถานะใหม่ทันที
            OBR.room.onMetadataChange(async () => {
                await checkState();
            });
        });

        window.selectSkill = async (skillName, gifFileName) => {
            if (!casterId || !targetId) return;
            
            document.getElementById('status').innerText = `💥 กำลังร่าย ${skillName}...`;
            
            // สั่งยิง Animation
            await playAnimation(casterId, targetId, gifFileName);
            
            // ยิงเสร็จปิดหน้าต่างเมนูให้เอง
            setTimeout(() => {
                // ล้างเป้าหมายที่เลือกไว้
                OBR.player.deselect([targetId]);
                OBR.popover.close("mugen-popover");
            }, 800);
        };

        async function playAnimation(sourceId, targetId, gifFileName) {
            const items = await OBR.scene.items.getItems([sourceId, targetId]);
            const source = items.find(i => i.id === sourceId);
            const target = items.find(i => i.id === targetId);

            if(!source || !target) return;

            const projectileId = "anim-" + Math.random().toString(36).substr(2, 9);
            const fullImageUrl = new URL(gifFileName, "https://en0lad0.github.io/mugen-ext/").href;
            
            const projectile = {
                id: projectileId,
                type: "IMAGE",
                image: {
                    url: fullImageUrl,
                    width: 150, 
                    height: 150, 
                    mime: "image/gif"
                },
                position: source.position,
                layer: "ATTACHMENT",
                disableHit: true, 
                locked: true,
                visible: true
            };

            await OBR.scene.items.addItems([projectile]);

            const frames = 15; 
            let currentFrame = 0;
            const dx = (target.position.x - source.position.x) / frames;
            const dy = (target.position.y - source.position.y) / frames;

            const animInterval = setInterval(async () => {
                currentFrame++;
                await OBR.scene.items.updateItems([projectileId], (itemsToUpdate) => {
                    itemsToUpdate[0].position.x = source.position.x + (dx * currentFrame);
                    itemsToUpdate[0].position.y = source.position.y + (dy * currentFrame);
                });

                if (currentFrame >= frames) {
                    clearInterval(animInterval);
                    setTimeout(() => {
                        OBR.scene.items.deleteItems([projectileId]);
                    }, 100);
                }
            }, 1000 / 30); 
        }
    </script>
</body>
</html>
