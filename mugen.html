<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugen Skills</title>
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: #222; margin: 0; padding: 10px; font-size: 14px;}
        .btn { width: 100%; padding: 12px; margin: 5px 0; cursor: pointer; color: white; border: none; font-weight: bold; border-radius: 5px; transition: 0.3s; font-size: 14px;}
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .aka { background: #d32f2f; }
        .ao { background: #1976d2; }
        .murasaki { background: #7b1fa2; }
        .status-box { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: left; line-height: 1.6;}
        .ready { color: #4caf50; font-weight: bold; }
        .wait { color: #ff9800; font-weight: bold; }
    </style>
</head>
<body>
    <div class="status-box">
        <div>1. ผู้ร่าย: <span id="status-caster" class="wait">❌ รอคลิกขวา</span></div>
        <div>2. เป้าหมาย: <span id="status-target" class="wait">❌ รอคลิกขวา</span></div>
    </div>

    <div id="skill-section" style="opacity: 0.3; pointer-events: none;">
        <button class="btn aka" onclick="fireSkill('Aka.gif')">🔴 ยิง Aka (Red)</button>
        <button class="btn ao" onclick="fireSkill('Ao.gif')">🔵 ยิง Ao (Blue)</button>
        <button class="btn murasaki" onclick="fireSkill('Murazaki.gif')">🟣 ยิง Murasaki (Purple)</button>
    </div>

    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        let casterId = null;
        let targetId = null;

        async function updateUI() {
            const metadata = await OBR.room.getMetadata();
            casterId = metadata["en0lad0.mugen/caster"];
            targetId = metadata["en0lad0.mugen/target"];

            const statusCaster = document.getElementById('status-caster');
            if (casterId) {
                statusCaster.innerText = "✅ พร้อมลุย!";
                statusCaster.className = "ready";
            } else {
                statusCaster.innerText = "❌ รอคลิกขวา (1. Set Caster)";
                statusCaster.className = "wait";
            }

            const statusTarget = document.getElementById('status-target');
            if (targetId) {
                statusTarget.innerText = "✅ ล็อกเป้าแล้ว!";
                statusTarget.className = "ready";
            } else {
                statusTarget.innerText = "❌ รอคลิกขวา (2. Lock Target)";
                statusTarget.className = "wait";
            }

            const skillSection = document.getElementById('skill-section');
            if (casterId && targetId) {
                skillSection.style.opacity = "1";
                skillSection.style.pointerEvents = "auto";
            } else {
                skillSection.style.opacity = "0.3";
                skillSection.style.pointerEvents = "none";
            }
        }

        OBR.onReady(async () => {
            await updateUI();
            OBR.room.onMetadataChange(async () => await updateUI());
        });

        window.fireSkill = async (gifFileName) => {
            if (!casterId || !targetId) return;

            document.getElementById('status-target').innerText = "🌀 กำลังรวบรวมพลัง!!";
            document.getElementById('skill-section').style.opacity = "0.3";
            document.getElementById('skill-section').style.pointerEvents = "none";
            
            try {
                await playAnimation(casterId, targetId, gifFileName);
                
                OBR.room.setMetadata({ "en0lad0.mugen/target": undefined }); 
                setTimeout(() => {
                    OBR.popover.close("mugen-popover"); 
                }, 500);

            } catch (err) {
                let errMsg = err ? (err.message || String(err)) : "ไม่ทราบสาเหตุ";
                OBR.notification.show("เกิดข้อผิดพลาด: " + errMsg, "ERROR");
                
                document.getElementById('status-target').innerText = "✅ ล็อกเป้าแล้ว!";
                document.getElementById('skill-section').style.opacity = "1";
                document.getElementById('skill-section').style.pointerEvents = "auto";
            }
        };

        function playAnimation(sourceId, targetId, gifFileName) {
            return new Promise(async (resolve, reject) => {
                const items = await OBR.scene.items.getItems([sourceId, targetId]);
                const source = items.find(i => i.id === sourceId);
                const target = items.find(i => i.id === targetId);

                if(!source || !target) {
                    reject(new Error("หา Token ต้นทางหรือเป้าหมายไม่เจอ"));
                    return;
                }

                // 1. คำนวณหา "จุดเกิด" ให้อยู่ข้างหน้าคนร่าย (หันไปทางเป้าหมาย)
                const dxTotal = target.position.x - source.position.x;
                const dyTotal = target.position.y - source.position.y;
                const distance = Math.sqrt(dxTotal * dxTotal + dyTotal * dyTotal);
                
                // เลื่อนจุดเกิดออกมาข้างหน้า 120 pixels (พ้นระยะขอบตัวละครพอดี)
                const offsetX = distance > 0 ? (dxTotal / distance) * 120 : 0;
                const offsetY = distance > 0 ? (dyTotal / distance) * 120 : 0;

                const spawnX = source.position.x + offsetX;
                const spawnY = source.position.y + offsetY;

                const projectileId = "anim-" + Math.random().toString(36).substr(2, 9);
                const fullImageUrl = "https://en0lad0.github.io/mugen-ext/" + gifFileName;
                
                try {
                    const projectile = {
                        id: projectileId,
                        type: "IMAGE",
                        name: "Mugen Skill",
                        image: { url: fullImageUrl, width: 250, height: 250, mime: "image/gif" },
                        grid: { dpi: 300, offset: { x: 125, y: 125 } },
                        position: { x: spawnX, y: spawnY },
                        scale: { x: 0.1, y: 0.1 }, // เริ่มจากขนาด 0.1 (จิ๋วมาก)
                        rotation: 0,
                        layer: "PROP", 
                        disableHit: true, 
                        locked: true, 
                        visible: true,
                        zIndex: 9999,
                        metadata: {}
                    };

                    await OBR.scene.items.addItems([projectile]);
                } catch (e) {
                    reject(new Error("สร้างลูกไฟไม่สำเร็จ: " + String(e)));
                    return;
                }

                // ==========================================
                // เฟส 1: รวบรวมพลัง (ชาร์จ 2 วินาที)
                // ==========================================
                const chargeTime = 2000; // 2000 ms = 2 วินาที
                const chargeIntervalTime = 50; // อัปเดตทุก 50ms
                const chargeFrames = chargeTime / chargeIntervalTime; // ทั้งหมด 40 เฟรม
                let currentCharge = 0;

                const chargeInterval = setInterval(async () => {
                    currentCharge++;
                    // คำนวณให้ขนาดขยายจาก 0.1 -> 1.0 ตามเปอร์เซ็นต์เวลาที่ผ่านไป
                    const scaleValue = 0.1 + (0.9 * (currentCharge / chargeFrames));

                    try {
                        await OBR.scene.items.updateItems([projectileId], (itemsToUpdate) => {
                            if (itemsToUpdate && itemsToUpdate.length > 0) {
                                itemsToUpdate[0].scale = { x: scaleValue, y: scaleValue };
                            }
                        });
                    } catch(e) {}

                    // เมื่อชาร์จครบ 2 วินาที ให้หยุดชาร์จแล้วเริ่มยิง!
                    if (currentCharge >= chargeFrames) {
                        clearInterval(chargeInterval);
                        document.getElementById('status-target').innerText = "💥 ปลดปล่อยพลัง!!";

                        // ==========================================
                        // เฟส 2: ยิงลูกพลัง (พุ่งไปหาเป้าหมาย)
                        // ==========================================
                        const shootFrames = 25; // จำนวนเฟรมที่พุ่ง (ปรับให้น้อย=เร็วขึ้น, มาก=ช้าลง)
                        let currentShootFrame = 0;
                        
                        const dxShoot = (target.position.x - spawnX) / shootFrames;
                        const dyShoot = (target.position.y - spawnY) / shootFrames;

                        const shootInterval = setInterval(async () => {
                            currentShootFrame++;
                            try {
                                await OBR.scene.items.updateItems([projectileId], (itemsToUpdate) => {
                                    if (itemsToUpdate && itemsToUpdate.length > 0) {
                                        itemsToUpdate[0].position.x = spawnX + (dxShoot * currentShootFrame);
                                        itemsToUpdate[0].position.y = spawnY + (dyShoot * currentShootFrame);
                                    }
                                });
                            } catch(e) {}

                            // เมื่อวิ่งชนเป้าหมาย
                            if (currentShootFrame >= shootFrames) {
                                clearInterval(shootInterval);
                                setTimeout(async () => { 
                                    await OBR.scene.items.deleteItems([projectileId]); 
                                    resolve(); 
                                }, 300); // รอแสดงผลแอนิเมชันตอนชน 0.3 วิแล้วค่อยลบทิ้ง
                            }
                        }, 40); // อัปเดตทุก 40ms ให้ดูไหลลื่น
                    }
                }, chargeIntervalTime);
            });
        }
    </script>
</body>
</html>
