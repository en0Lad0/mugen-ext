<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugen Loader</title>
</head>
<body style="background: #222; color: white; font-family: sans-serif; text-align: center; margin-top: 20px;">
    <h4>กำลังเปิดโหมดมุเก็น...</h4>
    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        OBR.onReady(async () => {
            // สั่งเปิด Tool เป้าเล็ง แล้วปิดหน้าต่างนี้ทิ้งทันที
            await OBR.tool.activateTool("en0lad0.mugen/tool");
            OBR.popover.close("mugen-popover");
        });
    </script>
</body>
</html>
