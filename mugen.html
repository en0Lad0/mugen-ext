<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugen Skills</title>
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: #222; margin: 0; padding: 10px; font-size: 14px;}
        .btn { width: 100%; padding: 12px; margin: 5px 0; cursor: pointer; color: white; border: none; font-weight: bold; border-radius: 5px; transition: 0.3s; font-size: 14px;}
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .aka { background: #d32f2f; }
        .ao { background: #1976d2; }
        .murasaki { background: #7b1fa2; }
        .status-box { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: left; line-height: 1.6;}
        .ready { color: #4caf50; font-weight: bold; }
        .wait { color: #ff9800; font-weight: bold; }
    </style>
</head>
<body>
    <div class="status-box">
        <div>1. ผู้ร่าย: <span id="status-caster" class="wait">❌ รอคลิกขวา</span></div>
        <div>2. เป้าหมาย: <span id="status-target" class="wait">❌ รอคลิกขวา</span></div>
    </div>

    <div id="skill-section" style="opacity: 0.3; pointer-events: none;">
        <button class="btn aka" onclick="fireSkill('Aka.gif')">🔴 ยิง Aka (Red)</button>
        <button class="btn ao" onclick="fireSkill('Ao.gif')">🔵 ยิง Ao (Blue)</button>
        <button class="btn murasaki" onclick="fireSkill('Murazaki.gif')">🟣 ยิง Murasaki (Purple)</button>
    </div>

    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        let casterId = null;
        let targetId = null;

        async function updateUI() {
            const metadata = await OBR.room.getMetadata();
            casterId = metadata["en0lad0.mugen/caster"];
            targetId = metadata["en0lad0.mugen/target"];

            const statusCaster = document.getElementById('status-caster');
            if (casterId) {
                statusCaster.innerText = "✅ พร้อมลุย!";
                statusCaster.className = "ready";
            } else {
                statusCaster.innerText = "❌ รอคลิกขวา (1. Set Caster)";
                statusCaster.className = "wait";
            }

            const statusTarget = document.getElementById('status-target');
            if (targetId) {
                statusTarget.innerText = "✅ ล็อกเป้าแล้ว!";
                statusTarget.className = "ready";
            } else {
                statusTarget.innerText = "❌ รอคลิกขวา (2. Lock Target)";
                statusTarget.className = "wait";
            }

            const skillSection = document.getElementById('skill-section');
            if (casterId && targetId) {
                skillSection.style.opacity = "1";
                skillSection.style.pointerEvents = "auto";
            } else {
                skillSection.style.opacity = "0.3";
                skillSection.style.pointerEvents = "none";
            }
        }

        OBR.onReady(async () => {
            await updateUI();
            OBR.room.onMetadataChange(async () => await updateUI());
        });

        window.fireSkill = async (gifFileName) => {
            if (!casterId || !targetId) return;

            document.getElementById('skill-section').style.opacity = "0.3";
            document.getElementById('skill-section').style.pointerEvents = "none";
            
            try {
                await playAnimation(casterId, targetId, gifFileName);
                
                OBR.room.setMetadata({ "en0lad0.mugen/target": undefined }); 
                setTimeout(() => {
                    OBR.popover.close("mugen-popover"); 
                }, 500);

            } catch (err) {
                let errMsg = err ? (err.message || String(err)) : "ไม่ทราบสาเหตุ";
                OBR.notification.show("เกิดข้อผิดพลาด: " + errMsg, "ERROR");
                
                document.getElementById('status-target').innerText = "✅ ล็อกเป้าแล้ว!";
                document.getElementById('skill-section').style.opacity = "1";
                document.getElementById('skill-section').style.pointerEvents = "auto";
            }
        };

        // ฟังก์ชันช่วยสร้างโครงสร้างรูปภาพให้ถูกต้อง (ลดการเขียนโค้ดซ้ำ)
        function createOrb(id, url, x, y, scaleVal) {
            return {
                id: id, type: "IMAGE", name: "Mugen Skill",
                image: { url: url, width: 250, height: 250, mime: "image/gif" },
                grid: { dpi: 300, offset: { x: 125, y: 125 } },
                position: { x: x, y: y },
                scale: { x: scaleVal, y: scaleVal },
                rotation: 0, layer: "PROP", disableHit: true, locked: true, visible: true, zIndex: 9999, metadata: {}
            };
        }

        function playAnimation(sourceId, targetId, gifFileName) {
            return new Promise(async (resolve, reject) => {
                const items = await OBR.scene.items.getItems([sourceId, targetId]);
                const source = items.find(i => i.id === sourceId);
                const target = items.find(i => i.id === targetId);

                if(!source || !target) {
                    reject(new Error("หา Token ต้นทางหรือเป้าหมายไม่เจอ"));
                    return;
                }

                // คำนวณเวกเตอร์และจุดเกิด (หันหน้าไปหาศัตรู)
                const dxTotal = target.position.x - source.position.x;
                const dyTotal = target.position.y - source.position.y;
                const distance = Math.sqrt(dxTotal * dxTotal + dyTotal * dyTotal);
                
                const nx = distance > 0 ? (dxTotal / distance) : 0;
                const ny = distance > 0 ? (dyTotal / distance) : 0;

                // จุดเกิดตรงกลาง (ยื่นมาข้างหน้า 120px)
                const spawnX = source.position.x + nx * 120;
                const spawnY = source.position.y + ny * 120;

                // ฟังก์ชันช่วยจัดการลูปแอนิเมชันให้เนียนตาและเขียนง่าย
                const runInterval = (duration, onUpdate) => {
                    return new Promise(res => {
                        const steps = Math.floor(duration / 40);
                        let current = 0;
                        const interval = setInterval(async () => {
                            current++;
                            const progress = Math.min(current / steps, 1);
                            await onUpdate(progress);
                            if (current >= steps) {
                                clearInterval(interval);
                                res();
                            }
                        }, 40);
                    });
                };

                const isMurazaki = gifFileName.includes("Murazaki");

                if (isMurazaki) {
                    // ==========================================
                    // โหมดท่าไม้ตาย: MURAZAKI (อลังการงานสร้าง)
                    // ==========================================
                    const akaUrl = "https://en0lad0.github.io/mugen-ext/Aka.gif";
                    const aoUrl = "https://en0lad0.github.io/mugen-ext/Ao.gif";
                    const muraUrl = "https://en0lad0.github.io/mugen-ext/Murazaki.gif";

                    // คำนวณพิกัดแกนตั้งฉาก สำหรับแยกลูกไฟออกซ้าย-ขวา
                    const px = -ny;
                    const py = nx;
                    
                    const akaX = spawnX + px * 100; // Aka ออกขวา
                    const akaY = spawnY + py * 100;
                    const aoX = spawnX - px * 100;  // Ao ออกซ้าย
                    const aoY = spawnY - py * 100;

                    const akaId = "anim-aka-" + Math.random().toString(36).substr(2, 9);
                    const aoId = "anim-ao-" + Math.random().toString(36).substr(2, 9);
                    const muraId = "anim-mura-" + Math.random().toString(36).substr(2, 9);

                    try {
                        // สเตปที่ 1: โผล่ Aka และ Ao
                        document.getElementById('status-target').innerText = "🌀 รวบรวมพลัง: Aka & Ao";
                        await OBR.scene.items.addItems([
                            createOrb(akaId, akaUrl, akaX, akaY, 0.1),
                            createOrb(aoId, aoUrl, aoX, aoY, 0.1)
                        ]);

                        await runInterval(2000, async (p) => {
                            const scale = 0.1 + (0.7 * p); // ขยายจาก 0.1 เป็น 0.8
                            try {
                                await OBR.scene.items.updateItems([akaId, aoId], items => {
                                    items.forEach(i => i.scale = {x: scale, y: scale});
                                });
                            } catch(e) {}
                        });

                        // สเตปที่ 2: ดึงลูกไฟทั้งสองมาผสมกันตรงกลาง
                        document.getElementById('status-target').innerText = "☯️ ผสมผสานพลัง!!";
                        await runInterval(1500, async (p) => {
                            const curAkaX = akaX + (spawnX - akaX) * p;
                            const curAkaY = akaY + (spawnY - akaY) * p;
                            const curAoX = aoX + (spawnX - aoX) * p;
                            const curAoY = aoY + (spawnY - aoY) * p;
                            try {
                                await OBR.scene.items.updateItems([akaId, aoId], items => {
                                    let aka = items.find(i => i.id === akaId);
                                    let ao = items.find(i => i.id === aoId);
                                    if(aka) aka.position = {x: curAkaX, y: curAkaY};
                                    if(ao) ao.position = {x: curAoX, y: curAoY};
                                });
                            } catch(e) {}
                        });

                        // สเตปที่ 3: ระเบิดเป็น Murazaki และขยายใหญ่สุดๆ
                        document.getElementById('status-target').innerText = "🟣 ท่าไม้ตาย: มุราซากิ!!";
                        await OBR.scene.items.deleteItems([akaId, aoId]);
                        await OBR.scene.items.addItems([createOrb(muraId, muraUrl, spawnX, spawnY, 0.5)]);

                        await runInterval(2000, async (p) => {
                            const scale = 0.5 + (1.5 * p); // ขยายจนใหญ่ถึง Scale 2.0 (ลูกยักษ์)
                            try {
                                await OBR.scene.items.updateItems([muraId], items => {
                                    if(items[0]) items[0].scale = {x: scale, y: scale};
                                });
                            } catch(e) {}
                        });

                        // สเตปที่ 4: ยิงลูกยักษ์ใส่หน้าเป้าหมาย
                        document.getElementById('status-target').innerText = "💥 ปลดปล่อยพลัง!!";
                        await runInterval(1000, async (p) => {
                            const curX = spawnX + (target.position.x - spawnX) * p;
                            const curY = spawnY + (target.position.y - spawnY) * p;
                            try {
                                await OBR.scene.items.updateItems([muraId], items => {
                                    if(items[0]) items[0].position = {x: curX, y: curY};
                                });
                            } catch(e) {}
                        });

                        // ยิงเสร็จเคลียร์ของ
                        setTimeout(async () => { await OBR.scene.items.deleteItems([muraId]); resolve(); }, 300);

                    } catch (e) {
                        reject(new Error("การสร้างภาพล้มเหลว"));
                    }

                } else {
                    // ==========================================
                    // โหมดปกติ: AKA และ AO (ร่าย 2 วิแล้วยิง)
                    // ==========================================
                    const projectileId = "anim-" + Math.random().toString(36).substr(2, 9);
                    const fullImageUrl = "https://en0lad0.github.io/mugen-ext/" + gifFileName;
                    
                    try {
                        await OBR.scene.items.addItems([createOrb(projectileId, fullImageUrl, spawnX, spawnY, 0.1)]);
                        
                        document.getElementById('status-target').innerText = "🌀 กำลังรวบรวมพลัง!!";
                        await runInterval(2000, async (p) => {
                            const scale = 0.1 + (0.9 * p);
                            try {
                                await OBR.scene.items.updateItems([projectileId], items => {
                                    if(items[0]) items[0].scale = {x: scale, y: scale};
                                });
                            } catch(e) {}
                        });

                        document.getElementById('status-target').innerText = "💥 ปลดปล่อยพลัง!!";
                        await runInterval(1000, async (p) => {
                            const curX = spawnX + (target.position.x - spawnX) * p;
                            const curY = spawnY + (target.position.y - spawnY) * p;
                            try {
                                await OBR.scene.items.updateItems([projectileId], items => {
                                    if(items[0]) items[0].position = {x: curX, y: curY};
                                });
                            } catch(e) {}
                        });

                        setTimeout(async () => { await OBR.scene.items.deleteItems([projectileId]); resolve(); }, 300);

                    } catch (e) {
                        reject(new Error("การสร้างภาพล้มเหลว"));
                    }
                }
            });
        }
    </script>
</body>
</html>
